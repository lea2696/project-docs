name: Structure Check

on:
  push:
    branches: [main, v2]
  pull_request:
    branches: [main, v2]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required directories
        run: |
          for dir in product architecture context references plans sessions handoffs memory scripts .claude/agents .claude/rules .agents/skills dist; do
            if [ ! -d "$dir" ]; then
              echo "❌ Missing directory: $dir"
              exit 1
            fi
          done
          echo "✅ All required directories exist"

      - name: Check dist completeness
        run: |
          # Verify dist/ has all required subdirectories
          for dir in product architecture context references plans sessions handoffs memory scripts/docs .claude/agents .claude/rules .agents/skills; do
            if [ ! -d "dist/$dir" ]; then
              echo "❌ Missing dist directory: dist/$dir"
              exit 1
            fi
          done
          echo "✅ All dist directories present"

          # Count dist files (minimum check)
          count=$(find dist/ -type f | wc -l)
          if [ "$count" -lt 35 ]; then
            echo "❌ dist/ has $count files (expected at least 35)"
            find dist/ -type f | sort
            exit 1
          fi
          echo "✅ dist/ has $count files (minimum 35)"

      - name: Check dist has no leftover template path vars
        run: |
          if grep -r '{{PROJECT_DOCS_PATH}}' dist/ 2>/dev/null; then
            echo "❌ Found leftover {{PROJECT_DOCS_PATH}} in dist/"
            exit 1
          fi
          echo "✅ No {{PROJECT_DOCS_PATH}} in dist/"

      - name: Check dist agent files
        run: |
          agents=$(ls dist/.claude/agents/*.md 2>/dev/null | wc -l)
          rules=$(ls dist/.claude/rules/*.md 2>/dev/null | wc -l)
          skills=$(find dist/.agents/skills -name "SKILL.md" 2>/dev/null | wc -l)
          echo "Agents: $agents, Rules: $rules, Skills: $skills"
          if [ "$agents" -ne 6 ] || [ "$rules" -ne 4 ] || [ "$skills" -ne 6 ]; then
            echo "❌ Expected 6 agents, 4 rules, 6 skills in dist/"
            exit 1
          fi
          echo "✅ All dist agent files present"

      - name: Check root files
        run: |
          for file in CLAUDE.md AGENTS.md install.sh dist/CLAUDE.md dist/AGENTS.md dist/.claude/settings.json; do
            if [ ! -f "$file" ]; then
              echo "❌ Missing: $file"
              exit 1
            fi
          done
          echo "✅ All root files present"
